    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #f43f5e;
            --bg-color: #1e293b;
            --card-bg: #334155;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-box {
            max-width: 600px;
            margin: 0 auto 20px auto;
        }

        .ad-container {
            max-width: 900px;
            margin: 0 auto 40px auto;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 12px;
            border: none;
            background: var(--card-bg);
            color: white;
            font-size: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            outline: none;
            border: 1px solid transparent;
            transition: border 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent-color);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .image-container {
            width: 100%;
            padding-top: 75%; 
            position: relative;
            background: #232f3e;
        }

        .image-container img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .game-info {
            padding: 12px;
            flex-grow: 1;
            text-align: center;
        }

        .game-title {
            font-size: 1rem;
            margin: 0;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--primary-color);
            max-width: 450px;
            width: 100%;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            text-align: center;
            border: 1px solid var(--accent-color);
        }

        .btn-play {
            display: inline-block;
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 20px;
            font-size: 1.1rem;
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-dim);
        }

        .counter {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>

    const grid = document.getElementById('gameGrid');
    const searchInput = document.getElementById('searchInput');
    const counter = document.getElementById('gameCounter');
    const modal = document.getElementById('gameModal');

    function renderGames(filter = "") {
        grid.innerHTML = "";
        const filtered = games.filter(g => g.title.toLowerCase().includes(filter.toLowerCase()));
        counter.innerText = `Mostrando ${filtered.length} de ${games.length} juegos`;

        filtered.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => openModal(game);
            
            card.innerHTML = `
                <div class="image-container">
                    <img src="${game.customImg}" alt="${game.title}" loading="lazy">
                </div>
                <div class="game-info">
                    <h3 class="game-title">${game.title}</h3>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function openModal(game) {
        const cleanId = game.id.trim();
        document.getElementById('modalTitle').innerText = game.title;
        document.getElementById('modalImg').src = game.customImg;
        document.getElementById('modalPlayBtn').href = `https://html5.gamemonetize.co/${cleanId}/`;
        modal.style.display = 'flex';
    }

    function closeModal() {
        modal.style.display = 'none';
    }

    window.onclick = (e) => { if(e.target == modal) closeModal(); }
    searchInput.addEventListener('input', (e) => renderGames(e.target.value));
    
    window.onload = () => renderGames();
</script>
