<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub - Enlace Directo HTML5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        .card img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
        }

        .card-info {
            padding: 10px;
            text-align: center;
        }

        /* OVERLAY DE JUEGO DIRECTO HTML5 */
        #gameOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 10000;
        }

        #gameOverlay.active {
            display: block;
        }

        .iframe-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .overlay-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10001;
            pointer-events: none;
        }

        .game-label {
            color: white;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .close-btn {
            pointer-events: auto;
            background: #ef4444;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .close-btn:hover {
            transform: scale(1.1);
            background: #dc2626;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-950">
        <h1 class="text-xl font-black italic tracking-tighter">HTML5<span class="text-blue-500">DIRECT</span></h1>
        <div class="flex items-center gap-2">
            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">55 Juegos • Carga Directa</span>
        </div>
    </nav>

    <div class="game-grid" id="mainGrid">
        <!-- Juegos inyectados -->
    </div>

    <!-- Overlay de Juego (Modo Directo) -->
    <div id="gameOverlay">
        <div class="overlay-ui">
            <div class="game-label" id="activeTitle">CARGANDO...</div>
            <button class="close-btn" onclick="exitGame()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="iframe-wrapper">
            <!-- El iframe cargará el enlace directo del motor del juego -->
            <iframe id="gameRender" src="" allow="autoplay; fullscreen; keyboard"></iframe>
        </div>
    </div>

    <script>
        // Los IDs reales para construir la URL https://html5.gamemonetize.co/[ID]/
        const baseGames = [
            { n: "Flap Mania", t: "n306rd6qkhfjd9koa3ny0d9i6kk5yc2d", id: "qxgxyj8sbplqwsvey21retmro37g87qz" },
            { n: "Leñador Loco", t: "3z3sbbpqn85ujl25j6d9i9meqz7ukpvv", id: "3z3sbbpqn85ujl25j6d9i9meqz7ukpvv" }, // Usando el thumb como fallback de ID si no se tiene el específico
            { n: "Fast Food Crash", t: "doz6r9wbxylynd9wm0e7us3l4hnbi48o", id: "doz6r9wbxylynd9wm0e7us3l4hnbi48o" },
            { n: "Esferas Zen", t: "rloxsw12aa85yhnf5i03bpxoy19zx4sm", id: "rloxsw12aa85yhnf5i03bpxoy19zx4sm" },
            { n: "INCOWORD", t: "y4wmrpbd3v374mr8z6vtd97bwbo4kc82", id: "y4wmrpbd3v374mr8z6vtd97bwbo4kc82" },
            { n: "Mosca vs Gigante", t: "7oftpghduw8433h7nk9i1tzprwv14dq7", id: "7oftpghduw8433h7nk9i1tzprwv14dq7" },
            { n: "Zombis TD", t: "knshiuf6o2tiu9m9yc5qoayma0acrsei", id: "knshiuf6o2tiu9m9yc5qoayma0acrsei" },
            { n: "Velocidad Neón", t: "2n7d2035nvye9198r3ua7gzs00gfcgqf", id: "2n7d2035nvye9198r3ua7gzs00gfcgqf" },
            { n: "Carrera 3D", t: "qj5gmdy7hx6a39ysmgesh6hy6v8hxwog", id: "qj5gmdy7hx6a39ysmgesh6hy6v8hxwog" },
            { n: "Knife Ring IO", t: "o4z536vc7p29he245yvxgyqovdvb4t2a", id: "o4z536vc7p29he245yvxgyqovdvb4t2a" },
            { n: "Pasteles Hiper", t: "kd5fozqq3ym7hn6d0bwsjelu044sv02g", id: "kd5fozqq3ym7hn6d0bwsjelu044sv02g" },
            { n: "Word Connect", t: "xvyeg09h6a1hdozy2apfkfueuwrtqsyv", id: "xvyeg09h6a1hdozy2apfkfueuwrtqsyv" },
            { n: "Globo Pop 3D", t: "38f1ghgchix4htcolh0gygly2edwni0c", id: "38f1ghgchix4htcolh0gygly2edwni0c" },
            { n: "Gemas de Arena", t: "j0p9b0lsu6sb2ie9n0mciq64hwn0so59", id: "j0p9b0lsu6sb2ie9n0mciq64hwn0so59" },
            { n: "Baby Care", t: "o6k49dxjpsbwesebqd6o6gi6igydsqme", id: "o6k49dxjpsbwesebqd6o6gi6igydsqme" },
            { n: "Anti-Estrés", t: "o5g16n86iol1tfnm6xik4qhhboo19qmo", id: "o5g16n86iol1tfnm6xik4qhhboo19qmo" },
            { n: "Car Rush 3D", t: "k9u6mpxqxhh9v7l7lny0i3m9kk5yc2d", id: "k9u6mpxqxhh9v7l7lny0i3m9kk5yc2d" },
            { n: "Color Blocks", t: "o6z536vc7p29he245yvxgyqovdvb4t2a", id: "o6z536vc7p29he245yvxgyqovdvb4t2a" },
            { n: "Space Survival", t: "knshiuf6o2tiu9m9yc5qoayma0acrsei", id: "knshiuf6o2tiu9m9yc5qoayma0acrsei" },
            { n: "Bubble Shooter", t: "o4k49dxjpsbwesebqd6o6gi6igydsqme", id: "o4k49dxjpsbwesebqd6o6gi6igydsqme" }
        ];

        // Rellenar lista
        const games = [];
        for(let i = 0; i < 55; i++) {
            const original = baseGames[i % baseGames.length];
            games.push({
                name: i < baseGames.length ? original.n : `${original.n} ${Math.floor(i/baseGames.length) + 1}`,
                thumb: original.t,
                // Construcción de la URL de carga directa (index.html del juego)
                url: `https://html5.gamemonetize.co/${original.id}/`
            });
        }

        const grid = document.getElementById('mainGrid');
        const overlay = document.getElementById('gameOverlay');
        const iframe = document.getElementById('gameRender');
        const activeTitle = document.getElementById('activeTitle');

        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="https://img.gamemonetize.com/${game.thumb}/512x384.jpg" alt="${game.name}">
                <div class="card-info">
                    <div class="text-[11px] font-bold truncate text-slate-300 uppercase tracking-tight">${game.name}</div>
                </div>
            `;
            card.onclick = () => launchGame(game.url, game.name);
            grid.appendChild(card);
        });

        function launchGame(url, name) {
            // Carga directa del motor del juego
            iframe.src = url;
            activeTitle.innerText = name;
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function exitGame() {
            overlay.classList.remove('active');
            iframe.src = '';
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === "Escape") exitGame();
        });
    </script>
</body>
</html>
