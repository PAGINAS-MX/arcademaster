<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acordes y Escalas - Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a; /* Fondo azul muy oscuro / negro */
            color: #f1f5f9;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .menu-card {
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 100px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: #1e293b;
        }
        .menu-card:active {
            transform: scale(0.95);
            background-color: #334155;
        }
        .note-bubble {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: 800;
            background: #1e293b;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            font-size: 0.85rem;
            color: white;
        }
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
        }
        .ad-container {
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 12px;
        }
        .modal-anim {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Estilo para los botones de las notas en el listado */
        .note-item-btn {
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #f1f5f9;
        }
        .note-item-btn:active {
            background-color: #334155;
        }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-10">

    <header class="text-center my-8">
        <h1 class="text-4xl font-extrabold text-white tracking-tighter">Acorde y Escalas</h1>
        <p class="text-slate-400 text-sm mt-1">Diccionario Musical Interactivo</p>
    </header>

    <!-- SECCIÓN: ACORDES -->
    <section class="mb-8">
        <h2 class="text-center font-bold text-slate-400 mb-4 flex items-center justify-center gap-2">
            <span class="w-8 h-[2px] bg-slate-700"></span>
            Acordes
            <span class="w-8 h-[2px] bg-slate-700"></span>
        </h2>
        <div class="grid grid-cols-2 gap-3">
            <div onclick="openCategory('Acordes Mayores', 'mayor')" class="menu-card rounded-2xl text-white hover:border-blue-500 shadow-lg">Mayores</div>
            <div onclick="openCategory('Acordes Menores', 'menor')" class="menu-card rounded-2xl text-white hover:border-red-500 shadow-lg">Menores</div>
        </div>
    </section>

    <!-- SECCIÓN: ESCALAS -->
    <section class="mb-10">
        <h2 class="text-center font-bold text-slate-400 mb-4 flex items-center justify-center gap-2">
            <span class="w-8 h-[2px] bg-slate-700"></span>
            Escalas
            <span class="w-8 h-[2px] bg-slate-700"></span>
        </h2>
        <div class="grid grid-cols-2 gap-3">
            <div onclick="openCategory('Escalas Mayores', 'escala_mayor')" class="menu-card rounded-2xl text-white hover:border-green-500 shadow-lg">Mayores</div>
            <div onclick="openCategory('Escalas Menores', 'escala_menor')" class="menu-card rounded-2xl text-white hover:border-purple-500 shadow-lg">Menores</div>
        </div>
    </section>

    <!-- PUBLICIDAD AL FINAL DE LA PÁGINA (ÚNICO LUGAR) -->
    <div class="ad-container mt-12 mb-6 border border-slate-800 p-2">
        <script async="async" data-cfasync="false" src="https://pl28935816.profitablecpmratenetwork.com/6b6ec0bb5b3a86407b137ca3974af392/invoke.js"></script>
        <div id="container-6b6ec0bb5b3a86407b137ca3974af392"></div>
    </div>

    <!-- MODAL LISTADO DE NOTAS -->
    <div id="modal-list" class="fixed inset-0 modal-overlay hidden flex items-end sm:items-center justify-center z-40 p-0 sm:p-4">
        <div class="bg-[#0f172a] border-t border-slate-800 w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl max-h-[85vh] overflow-y-auto modal-anim">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Seleccionar</p>
                    <h3 id="category-title" class="text-2xl font-black text-white">Categoría</h3>
                </div>
                <button onclick="closeModal('modal-list')" class="bg-slate-800 p-3 rounded-2xl text-slate-300 hover:bg-slate-700 transition-colors">✕</button>
            </div>
            <div id="notes-grid" class="grid grid-cols-3 gap-4 pb-10">
                <!-- Generado por JS -->
            </div>
        </div>
    </div>

    <!-- MODAL DETALLE -->
    <div id="modal-detail" class="fixed inset-0 modal-overlay hidden flex items-center justify-center p-6 z-50">
        <div class="bg-[#1e293b] w-full max-w-md rounded-[3rem] p-8 shadow-2xl text-center modal-anim border border-slate-700">
            <div id="detail-badge" class="inline-block px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter mb-4">Detalle</div>
            <h4 id="detail-title" class="text-4xl font-black text-white mb-6 tracking-tighter">Nota</h4>
            
            <div class="bg-[#0f172a] p-6 rounded-[2rem] mb-6 border border-slate-800">
                <p id="detail-subtitle" class="text-slate-500 text-[10px] font-bold uppercase mb-4 tracking-widest">Notas</p>
                <div id="detail-content" class="flex flex-wrap justify-center gap-3">
                    <!-- Burbujas de notas -->
                </div>
            </div>

            <button onclick="closeModal('modal-detail')" class="w-full py-4 bg-white text-slate-900 rounded-[1.2rem] font-bold text-lg shadow-lg active:scale-95 transition-transform">
                Cerrar
            </button>
        </div>
    </div>

    <script>
        const musicData = {
            notes: ['Do', 'Reb', 'Re', 'Mib', 'Mi', 'Fa', 'Fa#', 'Sol', 'Lab', 'La', 'Sib', 'Si'],
            
            chords: {
                'Do': { mayor: ['C', 'E', 'G'], menor: ['C', 'Eb', 'G'] },
                'Reb': { mayor: ['Db', 'F', 'Ab'], menor: ['Db', 'Fb', 'Ab'] },
                'Re': { mayor: ['D', 'F#', 'A'], menor: ['D', 'F', 'A'] },
                'Mib': { mayor: ['Eb', 'G', 'Bb'], menor: ['Eb', 'Gb', 'Bb'] },
                'Mi': { mayor: ['E', 'G#', 'B'], menor: ['E', 'G', 'B'] },
                'Fa': { mayor: ['F', 'A', 'C'], menor: ['F', 'Ab', 'C'] },
                'Fa#': { mayor: ['F#', 'A#', 'C#'], menor: ['F#', 'A', 'C#'] },
                'Sol': { mayor: ['G', 'B', 'D'], menor: ['G', 'Bb', 'D'] },
                'Lab': { mayor: ['Ab', 'C', 'Eb'], menor: ['Ab', 'Cb', 'Eb'] },
                'La': { mayor: ['A', 'C#', 'E'], menor: ['A', 'C', 'E'] },
                'Sib': { mayor: ['Bb', 'D', 'F'], menor: ['Bb', 'Db', 'F'] },
                'Si': { mayor: ['B', 'D#', 'F#'], menor: ['B', 'D', 'F#'] }
            },
            
            scales_mayor: {
                'Do': ['Do', 'Re', 'Mi', 'Fa', 'Sol', 'La', 'Si'],
                'Reb': ['Reb', 'Mib', 'Fa', 'Solb', 'Lab', 'Sib', 'Do'],
                'Re': ['Re', 'Mi', 'Fa#', 'Sol', 'La', 'Si', 'Do#'],
                'Mib': ['Mib', 'Fa', 'Sol', 'Lab', 'Sib', 'Do', 'Re'],
                'Mi': ['Mi', 'Fa#', 'Sol#', 'La', 'Si', 'Do#', 'Re#'],
                'Fa': ['Fa', 'Sol', 'La', 'Sib', 'Do', 'Re', 'Mi'],
                'Fa#': ['Fa#', 'Sol#', 'La#', 'Si', 'Do#', 'Re#', 'Fa'],
                'Sol': ['Sol', 'La', 'Si', 'Do', 'Re', 'Mi', 'Fa#'],
                'Lab': ['Lab', 'Sib', 'Do', 'Reb', 'Mib', 'Fa', 'Sol'],
                'La': ['La', 'Si', 'Do#', 'Re', 'Mi', 'Fa#', 'Sol#'],
                'Sib': ['Sib', 'Do', 'Re', 'Mib', 'Fa', 'Sol', 'La'],
                'Si': ['Si', 'Do#', 'Re#', 'Mi', 'Fa#', 'Sol#', 'La#']
            },

            scales_menor: {
                'La': ['La', 'Si', 'Do', 'Re', 'Mi', 'Fa', 'Sol'],
                'Sib': ['Sib', 'Do', 'Reb', 'Mib', 'Fa', 'Solb', 'Lab'],
                'Si': ['Si', 'Do#', 'Re', 'Mi', 'Fa#', 'Sol', 'La'],
                'Do': ['Do', 'Re', 'Mib', 'Fa', 'Sol', 'Lab', 'Sib'],
                'Do#': ['Do#', 'Re#', 'Mi', 'Fa#', 'Sol#', 'La', 'Si'],
                'Re': ['Re', 'Mi', 'Fa', 'Sol', 'La', 'Sib', 'Do'],
                'Re#': ['Re#', 'Fa', 'Fa#', 'Sol#', 'La#', 'Si', 'Do#'],
                'Mi': ['Mi', 'Fa#', 'Sol', 'La', 'Si', 'Do', 'Re'],
                'Fa': ['Fa', 'Sol', 'Lab', 'Sib', 'Do', 'Reb', 'Mib'],
                'Fa#': ['Fa#', 'Sol#', 'La', 'Si', 'Do#', 'Re', 'Mi'],
                'Sol': ['Sol', 'La', 'Sib', 'Do', 'Re', 'Mib', 'Fa'],
                'Sol#': ['Sol#', 'La#', 'Si', 'Do#', 'Re#', 'Mi', 'Fa#']
            }
        };

        function openCategory(title, type) {
            const modal = document.getElementById('modal-list');
            const catTitle = document.getElementById('category-title');
            const grid = document.getElementById('notes-grid');
            
            catTitle.innerText = title;
            grid.innerHTML = '';

            const currentNotesList = type === 'escala_menor' ? Object.keys(musicData.scales_menor) : musicData.notes;

            currentNotesList.forEach(note => {
                const btn = document.createElement('div');
                btn.className = "note-item-btn h-20 rounded-2xl flex items-center justify-center font-black text-xl active:scale-95 transition-all shadow-sm";
                btn.innerText = note;
                btn.onclick = () => showDetail(note, type);
                grid.appendChild(btn);
            });

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function showDetail(note, type) {
            const modal = document.getElementById('modal-detail');
            const title = document.getElementById('detail-title');
            const content = document.getElementById('detail-content');
            const badge = document.getElementById('detail-badge');
            const subtitle = document.getElementById('detail-subtitle');
            
            let notesToShow = [];
            let colorClass = "";

            if (type === 'mayor' || type === 'menor') {
                const isMenor = type === 'menor';
                title.innerText = note + (isMenor ? 'm' : '');
                badge.innerText = isMenor ? "Acorde Menor" : "Acorde Mayor";
                badge.className = `inline-block px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter mb-4 ${isMenor ? 'bg-red-900/30 text-red-400' : 'bg-blue-900/30 text-blue-400'}`;
                subtitle.innerText = "Notas del acorde";
                notesToShow = isMenor ? musicData.chords[note]?.menor : musicData.chords[note]?.mayor;
                colorClass = isMenor ? "border-red-500 text-red-400" : "border-blue-500 text-blue-400";
            } else if (type === 'escala_mayor') {
                title.innerText = note;
                badge.innerText = "Escala Mayor";
                badge.className = "inline-block px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter mb-4 bg-green-900/30 text-green-400";
                subtitle.innerText = "Notas de la escala";
                notesToShow = musicData.scales_mayor[note] || [];
                colorClass = "border-green-500 text-green-400";
            } else if (type === 'escala_menor') {
                title.innerText = note + "m";
                badge.innerText = "Escala Menor";
                badge.className = "inline-block px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter mb-4 bg-purple-900/30 text-purple-400";
                subtitle.innerText = "Notas de la escala";
                notesToShow = musicData.scales_menor[note] || [];
                colorClass = "border-purple-500 text-purple-400";
            }

            content.innerHTML = notesToShow ? notesToShow.map(n => `
                <div class="note-bubble border ${colorClass}">${n}</div>
            `).join('') : '<p class="text-slate-500">Datos no disponibles</p>';

            modal.classList.remove('hidden');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            if(id === 'modal-list') document.body.style.overflow = 'auto';
        }

        window.onclick = (e) => {
            if (e.target.classList.contains('modal-overlay')) {
                closeModal(e.target.id);
            }
        }
    </script>
</body>
</html>
