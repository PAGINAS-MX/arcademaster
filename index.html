<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub - Categoría Acción</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar { height: 4px; width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

        .category-pill {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }

        .category-pill.active {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.5);
            border-color: #60a5fa;
        }

        .game-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.3);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        #gameOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 10000;
        }

        #gameOverlay.active {
            display: block;
        }

        .iframe-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .overlay-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10001;
            pointer-events: none;
        }

        .close-btn {
            pointer-events: auto;
            background: #ef4444;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* Contenedor de Anuncios Estilizado */
        .ad-banner-container {
            width: 100%;
            max-width: 1200px;
            margin: 1rem auto;
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(30, 41, 59, 0.3);
            border-radius: 12px;
            border: 1px dashed rgba(51, 65, 85, 0.5);
            overflow: hidden;
        }
    </style>
</head>
<body>

    <nav class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-950 sticky top-0 z-50">
        <h1 class="text-xl font-black italic tracking-tighter uppercase">Arcade<span class="text-blue-500">Hub</span></h1>
        <div class="flex items-center gap-3">
            <div class="hidden md:block text-right">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Estado del Sistema</p>
                <p class="text-[10px] text-green-500 font-mono">ONLINE</p>
            </div>
            <button class="bg-slate-800 p-2 rounded-lg hover:bg-slate-700 transition">
                <i class="fas fa-search text-slate-400"></i>
            </button>
        </div>
    </nav>

    <!-- Espacio para Anuncio -->
    <div class="px-5">
        <div class="ad-banner-container">
            <!-- Bloque de Anuncio Proporcionado -->
            <script async="async" data-cfasync="false" src="https://pl28935816.effectivegatecpm.com/6b6ec0bb5b3a86407b137ca3974af392/invoke.js"></script>
            <div id="container-6b6ec0bb5b3a86407b137ca3974af392"></div>
        </div>
    </div>

    <!-- Sección de 10 Categorías -->
    <div class="bg-slate-900/50 border-b border-slate-800 py-4 px-5 overflow-x-auto">
        <div class="flex gap-3 min-w-max" id="categoryContainer">
            <!-- Categorías Generadas por JS -->
        </div>
    </div>

    <!-- Contenedor de Contenido -->
    <main class="min-h-[70vh] p-4">
        <!-- Estado Vacío -->
        <div class="flex flex-col items-center justify-center py-20 text-center px-4" id="emptyState">
            <div class="bg-slate-900 p-10 rounded-3xl border border-slate-800 shadow-2xl">
                <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-layer-group text-3xl text-blue-500"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-2" id="categoryNameDisplay">Acción</h2>
                <p class="text-slate-500 max-w-xs mx-auto">Selecciona "Acción" para ver los juegos disponibles.</p>
            </div>
        </div>

        <!-- Grid de Juegos -->
        <div class="game-grid hidden" id="mainGrid">
            <!-- Los juegos se cargan dinámicamente aquí -->
        </div>
    </main>

    <!-- Overlay de Juego -->
    <div id="gameOverlay">
        <div class="overlay-ui">
            <div class="bg-black/60 backdrop-blur-md px-4 py-2 rounded-full border border-white/10 text-white text-xs font-bold uppercase tracking-widest" id="activeTitle">
                Cargando...
            </div>
            <button class="close-btn shadow-lg" onclick="exitGame()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="iframe-wrapper">
            <iframe id="gameRender" src="" allow="autoplay; fullscreen; keyboard"></iframe>
        </div>
    </div>

    <script>
        // Listado de juegos para la categoría Acción
        const actionGames = [
            { id: 1, name: "Arte en pasteles 3D", thumb: "https://img.gamemonetize.com/u7bg9t65saj2e2n19tfzn60qeaci5ash/512x384.jpg", url: "https://gamemonetize.com/cake-art-3d-game" },
            { id: 2, name: "Vuelo de aves", thumb: "https://img.gamemonetize.com/6cmeexyonhbwmtymr3w5q24ebphb4isu/512x384.jpg", url: "https://gamemonetize.com/birdflying-game" },
            { id: 3, name: "ESFERA", thumb: "https://img.gamemonetize.com/nub98t45rz31qr4gi4y78zegzxp5vxkf/512x384.jpg", url: "https://gamemonetize.com/spherix-game" },
            { id: 4, name: "Fiesta de paletas", thumb: "https://img.gamemonetize.com/y6dbojw5m18tdimu5o3n1128ddysog24/512x384.jpg", url: "https://gamemonetize.com/fruit-pop-fiesta-game" },
            { id: 5, name: "Palabras Ocultas", thumb: "https://img.gamemonetize.com/60ugltw0ffycu97l5f742t58a57mckpf/512x384.jpg", url: "https://gamemonetize.com/hidden-word-puzzle-game" },
            { id: 6, name: "Explosión Submarina", thumb: "https://img.gamemonetize.com/2hi4m994leltx60qqb43y9xyhd63jcl5/512x384.jpg", url: "https://gamemonetize.com/underwater-blast-game" },
            { id: 7, name: "Robo en el túnel", thumb: "https://img.gamemonetize.com/ta6wm53uvpvizef4515zrc4kdcjapqgh/512x384.jpg", url: "https://gamemonetize.com/tunnel-heist-game" },
            { id: 8, name: "Conde Maestro Rush", thumb: "https://img.gamemonetize.com/41vwvtz70g8h6urd0s5c9k0gte1jhwfr/512x384.jpg", url: "https://gamemonetize.com/count-master-rush-game" },
            { id: 9, name: "ZingAliens", thumb: "https://img.gamemonetize.com/j5adn527pxfr0qdx1gz6nepbhouheoiv/512x384.jpg", url: "https://gamemonetize.com/zingaliens-game" },
            { id: 10, name: "Escape carmesí", thumb: "https://img.gamemonetize.com/vxrgn6a2a8flyow263k2qke9e519aqqk/512x384.jpg", url: "https://gamemonetize.com/crimson-escape-game" },
            { id: 11, name: "Sort Puzzle", thumb: "https://img.gamemonetize.com/jbrmpqi1d5tqzqr2qgiuqn45zt60fizf/512x384.jpg", url: "https://gamemonetize.com/gem-sort-puzzle-game" },
            { id: 12, name: "HogHavoc", thumb: "https://img.gamemonetize.com/jky2ccbui6itaxvfia0tms9bo0zorn48/512x384.jpg", url: "https://gamemonetize.com/hoghavoc-game" },
            { id: 13, name: "Arrow Master", thumb: "https://img.gamemonetize.com/6dtv4ssq6cyfi00abbsebalcpdekubr8/512x384.jpg", url: "https://gamemonetize.com/arrow-count-master-game" },
            { id: 14, name: "Labubu Burger", thumb: "https://img.gamemonetize.com/02yeisitp2cqonheb3x9kzr8iyelauk1/512x384.jpg", url: "https://gamemonetize.com/labubu-hidden-burger-game" },
            { id: 15, name: "Crystal Crash", thumb: "https://img.gamemonetize.com/mrccgcvib1l5gzqelr1dknq5upuu39tn/512x384.jpg", url: "https://gamemonetize.com/crystal-craash-game" },
            { id: 16, name: "Ninja Slash", thumb: "https://img.gamemonetize.com/u7bg9t65saj2e2n19tfzn60qeaci5ash/512x384.jpg", url: "https://gamemonetize.com/ninja-slash-game" },
            { id: 17, name: "Tank Assault", thumb: "https://img.gamemonetize.com/nub98t45rz31qr4gi4y78zegzxp5vxkf/512x384.jpg", url: "https://gamemonetize.com/tank-assault-game" },
            { id: 18, name: "Cyber Runner", thumb: "https://img.gamemonetize.com/vxrgn6a2a8flyow263k2qke9e519aqqk/512x384.jpg", url: "https://gamemonetize.com/cyber-runner-game" },
            { id: 19, name: "Zombie Strike", thumb: "https://img.gamemonetize.com/ta6wm53uvpvizef4515zrc4kdcjapqgh/512x384.jpg", url: "https://gamemonetize.com/zombie-strike-game" },
            { id: 20, name: "Space Wars", thumb: "https://img.gamemonetize.com/j5adn527pxfr0qdx1gz6nepbhouheoiv/512x384.jpg", url: "https://gamemonetize.com/space-wars-game" }
        ];

        const categories = [
            { id: 'all', name: 'Todos', icon: 'fa-border-all' },
            { id: 'action', name: 'Acción', icon: 'fa-fire' },
            { id: 'sports', name: 'Deportes', icon: 'fa-football' },
            { id: 'puzzle', name: 'Puzzle', icon: 'fa-puzzle-piece' },
            { id: 'racing', name: 'Carreras', icon: 'fa-flag-checkered' },
            { id: 'adventure', name: 'Aventura', icon: 'fa-compass' },
            { id: 'arcade', name: 'Clásicos', icon: 'fa-ghost' },
            { id: 'shooting', name: 'Disparos', icon: 'fa-crosshairs' },
            { id: 'strategy', name: 'Estrategia', icon: 'fa-chess' },
            { id: 'multiplayer', name: 'Multijugador', icon: 'fa-users' }
        ];

        const container = document.getElementById('categoryContainer');
        const mainGrid = document.getElementById('mainGrid');
        const emptyState = document.getElementById('emptyState');
        const catNameDisplay = document.getElementById('categoryNameDisplay');
        const overlay = document.getElementById('gameOverlay');
        const iframe = document.getElementById('gameRender');
        const activeTitle = document.getElementById('activeTitle');

        // Renderizar Categorías
        categories.forEach((cat) => {
            const btn = document.createElement('button');
            btn.className = `category-pill flex items-center gap-2 px-5 py-2.5 rounded-xl border border-slate-700 bg-slate-800 text-slate-300 text-sm font-semibold hover:border-slate-500 transition-all`;
            btn.innerHTML = `<i class="fas ${cat.icon}"></i> ${cat.name}`;
            
            btn.onclick = () => {
                document.querySelectorAll('.category-pill').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                if(cat.id === 'action' || cat.id === 'all') {
                    renderGames(actionGames);
                } else {
                    showEmpty(cat.name);
                }
            };
            container.appendChild(btn);
        });

        function renderGames(games) {
            emptyState.classList.add('hidden');
            mainGrid.classList.remove('hidden');
            mainGrid.innerHTML = '';
            
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = "game-card bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden cursor-pointer";
                card.onclick = () => launchGame(game.url, game.name);
                
                card.innerHTML = `
                    <div class="aspect-[4/3] relative overflow-hidden">
                        <img src="${game.thumb}" class="w-full h-full object-cover" alt="${game.name}">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                    </div>
                    <div class="p-3">
                        <h3 class="text-sm font-bold text-white truncate">${game.name}</h3>
                        <p class="text-[10px] text-blue-400 font-bold uppercase mt-1">Acción</p>
                    </div>
                `;
                mainGrid.appendChild(card);
            });
        }

        function showEmpty(name) {
            mainGrid.classList.add('hidden');
            emptyState.classList.remove('hidden');
            catNameDisplay.innerText = name;
        }

        function launchGame(url, name) {
            iframe.src = url;
            activeTitle.innerText = name;
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function exitGame() {
            overlay.classList.remove('active');
            iframe.src = '';
            document.body.style.overflow = 'auto';
        }

        // Seleccionar Acción por defecto al cargar
        window.onload = () => {
            const actionBtn = container.children[1];
            if(actionBtn) actionBtn.click();
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === "Escape") exitGame();
        });
    </script>
</body>
</html>
